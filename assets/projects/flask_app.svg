<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360">
  <desc>Hand-drawn style SVG for AI Flask App — API Snapshot</desc>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#000a12"/>

  <!-- Card Container -->
  <g transform="translate(20,20)">
    <rect width="860" height="320" rx="12" fill="#041026" stroke="#002a32"/>

    <!-- Title -->
    <text x="28" y="34" fill="#6be0ff" font-size="18" font-family="Inter">AI Flask App — API Snapshot</text>

    <!-- API Demo Block -->
    <g transform="translate(40,80)" fill="#9be8c7" font-family="monospace">
      <text x="0" y="0" font-size="14">POST /predict</text>

      <!-- Animated API Container -->
      <rect x="0" y="16" width="680" height="120" rx="8" fill="#001827" stroke="#003a3f">
        <!-- Optional glowing stroke animation -->
        <animate attributeName="stroke" values="#003a3f;#00ff9f;#003a3f" dur="4s" repeatCount="indefinite"/>
      </rect>

      <!-- Response JSON -->
      <text x="20" y="56" font-size="14" fill="#00ff9f">
        {"input": [1, 2, 3], "prediction": 0.87}
        <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>
</svg>
