<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360">
  <desc>Hand-drawn style SVG for Unique Paths — Grid Preview (animated)</desc>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#020519"/>

  <!-- Card -->
  <g transform="translate(20,20)">
    <rect width="860" height="320" rx="12" fill="#041026" stroke="#00334d"/>

    <!-- Header -->
    <rect x="12" y="12" width="836" height="36" rx="8" fill="#00121a" stroke="#002b3a">
      <animate attributeName="stroke" values="#002b3a;#00ff9f;#002b3a" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="28" y="36" fill="#00ff9f" font-size="18" font-family="Inter">
      Unique Paths — Grid Preview
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
    </text>

    <!-- Grid Visualization -->
    <g transform="translate(40,80)" fill="#0be7b3" font-family="monospace">
      <text x="0" y="0" font-size="14">Grid (5×5):</text>
      <rect x="0" y="10" width="220" height="120" rx="8" fill="#001827" stroke="#003a3f">
        <animate attributeName="stroke" values="#003a3f;#00ff9f;#003a3f" dur="4s" repeatCount="indefinite"/>
      </rect>

      <!-- Grid numbers -->
      <g transform="translate(10,20)" fill="#9bf6d8" font-size="12">
        <text x="0" y="0">[1, 1, 1, 1, 1]</text>
        <text x="0" y="18">[1, 2, 3, 4, 5]</text>
        <text x="0" y="36">[1, 3, 6, 10, 15]</text>
        <text x="0" y="54">[1, 4, 10, 20, 35]</text>
        <text x="0" y="72" fill="#00ff9f">[1, 5, 15, 35, 70]</text>
      </g>
    </g>

    <!-- Animated highlight border -->
    <rect x="38" y="78" width="224" height="124" rx="10" fill="none" stroke="#00ff9f" stroke-width="1.2" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
