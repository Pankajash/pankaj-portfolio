<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360">
  <desc>Hand-drawn style SVG for Coin Change Solver — with glow animation</desc>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#03041a"/>

  <!-- Card container -->
  <g transform="translate(18,18)">
    <rect width="864" height="324" rx="12" fill="#06122a" stroke="#022a35"/>

    <!-- Title -->
    <text x="34" y="34" fill="#6be0ff" font-size="18" font-family="Inter">Coin Change Solver — Snapshot</text>

    <!-- Inner content -->
    <g transform="translate(40,80)" fill="#9be8c7">
      <text x="0" y="0" font-family="monospace" font-size="14">Coins: [1,2,5]  Target: 11</text>

      <!-- Animated container box -->
      <rect x="0" y="16" width="380" height="120" rx="10" fill="#001827" stroke="#004049">
        <!-- stroke color glowing animation -->
        <animate attributeName="stroke" values="#004049;#00ff9f;#004049" dur="4s" repeatCount="indefinite"/>
      </rect>

      <!-- Animated result text -->
      <text x="20" y="60" font-family="monospace" font-size="16" fill="#00ff9f">
        Min coins → 3  (example)
        <!-- subtle pulse effect -->
        <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>
</svg>
