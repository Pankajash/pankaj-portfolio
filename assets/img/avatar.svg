    <circle cx='66' cy='52' r='4' fill='#00ff9f'/>
    <circle cx='94' cy='52' r='4' fill='#6be0ff'/>
    <rect x='60' y='74' width='40' height='8' rx='4' fill='#00ff9f' opacity='0.12'/>
