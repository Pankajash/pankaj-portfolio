function setEmotion(state) {
  const core = document.getElementById('core');
  const cloud = document.getElementById('emotionCloud').querySelector('ellipse');
  const symbol = document.getElementById('emotionSymbol');

  const moods = {
    calm:  { fill: 'url(#calmGrad)', emoji: '💭' },
    happy: { fill: 'url(#happyGrad)', emoji: '😄' },
    alert: { fill: 'url(#alertGrad)', emoji: '⚡' },
    angry: { fill: 'url(#angryGrad)', emoji: '🔥' },
  };

  if (moods[state]) {
    core.setAttribute('fill', moods[state].fill);
    cloud.setAttribute('fill', moods[state].fill);
    symbol.textContent = moods[state].emoji;
  }
}
