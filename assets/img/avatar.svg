
<svg><desc>Hand-drawn style svg for project preview</desc> xmlns='http://www.w3.org/2000/svg' viewBox='0 0 240 240' width='240' height='240'>
  <defs>
    <linearGradient id='g1' x1='0' x2='1'><stop offset='0' stop-color='#00ff9f'/><stop offset='1' stop-color='#6be0ff'/></linearGradient>
