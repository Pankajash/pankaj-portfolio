<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Coin Change Solver</title><link rel='stylesheet' href='../style.css'></head><body data-theme='dark'><header class='mast'><nav class='topnav'><div class='brand'>Pankaj<span class='dot'>;</span></div><ul class='links'><li><a href='../index.html'>Home</a></li><li><a href='unique_paths.html'>Projects</a></li></ul><div class='actions'><a class='btn' href='../assets/RESUME_PANKAJ.pdf' download>Resume</a><button id='themeToggle'>☀️</button></div></nav></header><main class='proj-main'><div class='proj-card'><img src='../assets/projects/coin_change.svg' class='proj-hero' alt='Coin Change'><h1>Coin Change Solver</h1><p class='muted'>JavaScript — Dynamic Programming visualization</p><p>Visual solver to compute minimum coins required for a target amount.</p><h3>Demo</h3><label>Coins (comma): <input id='coins' value='1,2,5'></label><label>Target: <input id='target' value='11'></label><button id='solve'>Solve</button><pre id='res' class='terminal'></pre></div></main><script src='../script_multi.js'></script><script>function minCoins(coins, target){const dp=Array(target+1).fill(Infinity);dp[0]=0;for(let c of coins){for(let i=c;i<=target;i++){dp[i]=Math.min(dp[i], dp[i-c]+1)}}return dp[target]===Infinity?-1:dp[target];}document.getElementById('solve').onclick=()=>{const coins=document.getElementById('coins').value.split(',').map(x=>parseInt(x.trim())).filter(Boolean);const t=parseInt(document.getElementById('target').value);document.getElementById('res').textContent='Min coins: '+minCoins(coins,t);} </script></body></html>
