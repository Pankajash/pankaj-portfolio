<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Interactive Coin Change Solver — visualize dynamic programming for minimum coin problems.">
  <title>Coin Change Solver</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body { font-family: Inter, system-ui, sans-serif; }
    .terminal {
      background: #011025;
      color: #00ff9f;
      padding: 10px;
      border-radius: 6px;
      margin-top: 12px;
      min-height: 50px;
    }
    label {
      display: block;
      margin-top: 10px;
      color: var(--muted);
    }
  </style>
</head>

<body data-theme="dark">
  <header class="mast">
    <nav class="topnav">
      <div class="brand">Pankaj<span class="dot">;</span></div>
      <ul class="links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="unique_paths.html">Unique Paths</a></li>
      </ul>
      <div class="actions">
        <a class="btn" href="../assets/RESUME_PANKAJ.pdf" download>Resume</a>
        <button id="themeToggle" aria-label="Toggle theme">☀️</button>
      </div>
    </nav>
  </header>

  <main class="proj-main">
    <div class="proj-card">
      <img src="../assets/projects/coin_change.svg" class="proj-hero" alt="Coin Change illustration">
      <h1>Coin Change Solver</h1>
      <p class="muted">JavaScript — Dynamic Programming Visualization</p>
      <p>Visual solver to compute minimum coins required for a target amount.</p>

      <h3>Demo</h3>
      <label for="coins">Coins (comma-separated):</label>
      <input id="coins" value="1,2,5">

      <label for="target">Target Amount:</label>
      <input id="target" value="11">

      <button id="solve">Solve</button>
      <pre id="res" class="terminal"></pre>
    </div>
  </main>

  <script src="../script_multi.js"></script>
  <script>
    function minCoins(coins, target) {
      const dp = Array(target + 1).fill(Infinity);
      dp[0] = 0;
      for (let c of coins) {
        for (let i = c; i <= target; i++) {
          dp[i] = Math.min(dp[i], dp[i - c] + 1);
        }
      }
      return dp[target] === Infinity ? -1 : dp[target];
    }

    document.getElementById('solve').onclick = () => {
      const coins = document.getElementById('coins').value
        .split(',')
        .map(x => parseInt(x.trim()))
        .filter(Boolean);
      const t = parseInt(document.getElementById('target').value);
      const result = minCoins(coins, t);
      document.getElementById('res').textContent =
        isNaN(result) || result === -1
          ? 'No valid solution for given inputs.'
          : 'Min coins: ' + result;
    };

    const themeBtn = document.getElementById('themeToggle');
    themeBtn.addEventListener('click', () => {
      const body = document.body;
      const current = body.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      body.setAttribute('data-theme', next);
      themeBtn.textContent = next === 'dark' ? '☀️' : '🌙';
    });
  </script>
</body>
</html>
